<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selective Work — Kuldeep Rohilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --text: #ffffff;
      --muted: #888888;
      --line: rgba(255,255,255,0.1);
      --font: 'Barlow', sans-serif;
      --side: 32px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    .cursor-dot {
      position: fixed;
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: transform 0.1s ease;
    }
    .cursor-dot.expanded {
      transform: translate(-50%, -50%) scale(5);
      opacity: 0.4;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--side);
      height: 56px;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .logo {
      font-size: 14px; font-weight: 700;
      color: var(--text); text-decoration: none;
      letter-spacing: 0.04em;
    }

    nav { display: flex; gap: 36px; }
    nav a {
      color: var(--text); text-decoration: none;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0.7; transition: opacity 0.2s;
    }
    nav a:hover, nav a.active { opacity: 1; }

    .header-right {
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.1em; color: var(--text); opacity: 0.7;
    }

    .mob-btn {
      display: none; background: none; border: none;
      color: var(--text); font-family: var(--font);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer;
    }

    /* ── MOBILE NAV ── */
    .mob-nav {
      display: none; position: fixed; inset: 0;
      background: #0e0e0e; z-index: 600;
      flex-direction: column; align-items: flex-start;
      justify-content: center; padding: 48px var(--side); gap: 24px;
    }
    .mob-nav.open { display: flex; }
    .mob-nav a {
      font-size: 40px; font-weight: 800; color: #fff;
      text-decoration: none; text-transform: uppercase;
    }
    .mob-close {
      position: absolute; top: 18px; right: var(--side);
      background: none; border: none; color: #fff;
      font-family: var(--font); font-size: 11px;
      font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; cursor: pointer;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 100px var(--side) 40px;
      border-bottom: 1px solid var(--line);
    }
    .page-header h1 {
      font-size: clamp(40px, 7vw, 96px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .page-header p {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── GALLERY GRID ── */
    .gallery {
      padding: 32px var(--side) 80px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: 80px;
      gap: 16px;
    }

    /* Layout patterns — landscape and portrait mix */
    .photo-item {
      position: relative;
      overflow: hidden;
      cursor: none;
      background: #1a1a1a;
    }
    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.4s ease;
      filter: brightness(0.9);
    }
    .photo-item:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }

    /* Overlay on hover */
    .photo-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s ease;
    }
    .photo-item:hover .photo-overlay {
      background: rgba(0,0,0,0.25);
    }
    .expand-icon {
      width: 40px; height: 40px;
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .expand-icon svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; }
    .photo-item:hover .expand-icon {
      opacity: 1;
      transform: scale(1);
    }

    /* Grid item sizes */
    /* Row 1 */
    .photo-item:nth-child(1)  { grid-column: 1 / 8;  grid-row: 1 / 6;  } /* landscape wide */
    .photo-item:nth-child(2)  { grid-column: 8 / 13; grid-row: 1 / 9;  } /* portrait */
    /* Row 2 */
    .photo-item:nth-child(3)  { grid-column: 1 / 5;  grid-row: 6 / 12; } /* portrait */
    .photo-item:nth-child(4)  { grid-column: 5 / 8;  grid-row: 6 / 12; } /* portrait */
    /* Row 3 */
    .photo-item:nth-child(5)  { grid-column: 8 / 13; grid-row: 9 / 14; } /* landscape */
    .photo-item:nth-child(6)  { grid-column: 1 / 6;  grid-row: 12 / 17;} /* landscape */
    .photo-item:nth-child(7)  { grid-column: 6 / 9;  grid-row: 12 / 18;} /* portrait */
    .photo-item:nth-child(8)  { grid-column: 9 / 13; grid-row: 14 / 20;} /* portrait */
    /* Row 4 */
    .photo-item:nth-child(9)  { grid-column: 1 / 6;  grid-row: 17 / 22;} /* landscape */
    .photo-item:nth-child(10) { grid-column: 6 / 9;  grid-row: 18 / 23;} /* portrait */
    .photo-item:nth-child(11) { grid-column: 9 / 13; grid-row: 20 / 25;} /* portrait */
    .photo-item:nth-child(12) { grid-column: 1 / 7;  grid-row: 22 / 27;} /* landscape wide */

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lb-img-wrap {
      max-width: 88vw;
      max-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lb-img-wrap img {
      max-width: 88vw;
      max-height: 88vh;
      object-fit: contain;
      display: block;
      transition: opacity 0.25s ease;
    }
    .lb-img-wrap img.fading { opacity: 0; }

    /* Counter */
    .lb-counter {
      position: absolute;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* Close */
    .lb-close {
      position: absolute;
      top: 24px; right: 32px;
      background: none; border: none;
      color: #fff; font-family: var(--font);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      cursor: pointer; opacity: 0.6;
      transition: opacity 0.2s;
    }
    .lb-close:hover { opacity: 1; }

    /* Prev / Next arrows */
    .lb-prev, .lb-next {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: #fff; width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .lb-prev { left: 32px; }
    .lb-next { right: 32px; }
    .lb-prev:hover, .lb-next:hover {
      border-color: #fff;
      background: rgba(255,255,255,0.08);
    }
    .lb-prev svg, .lb-next svg {
      width: 18px; height: 18px;
      stroke: #fff; fill: none; stroke-width: 2;
    }

    /* Dots */
    .lb-dots {
      position: absolute;
      bottom: 28px;
      left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px;
    }
    .lb-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: none; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      padding: 0;
    }
    .lb-dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* ── FOOTER ── */
    footer {
      padding: 24px var(--side);
      border-top: 1px solid var(--line);
    }
    footer p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { display: none; }
      .header-right { display: none; }
      .mob-btn { display: block; }
      --side: 16px;

      .gallery {
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: 180px;
        gap: 10px;
        padding: 24px 16px 60px;
      }
      .photo-item:nth-child(1)  { grid-column: 1 / 3; grid-row: auto; }
      .photo-item:nth-child(2)  { grid-column: auto;  grid-row: auto; }
      .photo-item:nth-child(3)  { grid-column: auto;  grid-row: auto; }
      .photo-item:nth-child(4)  { grid-column: auto;  grid-row: auto; }
      .photo-item:nth-child(5)  { grid-column: 1 / 3; grid-row: auto; }
      .photo-item:nth-child(6)  { grid-column: auto;  grid-row: auto; }
      .photo-item:nth-child(7)  { grid-column: auto;  grid-row: auto; }
      .photo-item:nth-child(8)  { grid-column: auto;  grid-row: auto; }
      .photo-item:nth-child(9)  { grid-column: 1 / 3; grid-row: auto; }
      .photo-item:nth-child(10) { grid-column: auto;  grid-row: auto; }
      .photo-item:nth-child(11) { grid-column: auto;  grid-row: auto; }
      .photo-item:nth-child(12) { grid-column: 1 / 3; grid-row: auto; }

      .lb-prev { left: 12px; }
      .lb-next { right: 12px; }
      .page-header { padding: 80px 16px 28px; }
    }
  </style>
</head>

  <script>
    // ── CURSOR ──
    const dot = document.getElementById('cursorDot');
    document.addEventListener('mousemove', e => {
      dot.style.left = e.clientX + 'px';
      dot.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('.photo-item').forEach(el => {
      el.addEventListener('mouseenter', () => dot.classList.add('expanded'));
      el.addEventListener('mouseleave', () => dot.classList.remove('expanded'));
    });

    // ── MOBILE NAV ──
    function mobOpen()  { document.getElementById('mobNav').classList.add('open'); }
    function mobClose() { document.getElementById('mobNav').classList.remove('open'); }

    // ── LIGHTBOX DATA ──
    const images = [
      'https://framerusercontent.com/images/NttmaohG1P69PNzRiBuwFbwDw0.webp',
      'https://framerusercontent.com/images/il2xuEmA8CeQHcLSG1SjZpTDys.jpg',
      'https://framerusercontent.com/images/SKwLwQq84WnB5bDrgWBresonBtw.jpg',
      'https://framerusercontent.com/images/gZRefHMvIF3jVM7Pv72QUN0.jpg',
      'https://framerusercontent.com/images/MVF4o0NaWQhCbJN7HDqJdoa8bs.webp',
      'https://framerusercontent.com/images/G7F5lBUTxyEcvIEObsURpkAAN4c.jpg',
      'https://framerusercontent.com/images/kk06pmsE0G6koDaA4tTfqY7aDYc.jpg',
      'https://framerusercontent.com/images/Xp5jx8fbA9Sxh5xJOEjhHN9wgcE.jpg',
    ];

    let current = 0;
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lbImg');
    const lbCount = document.getElementById('lbCounter');
    const lbDots  = document.getElementById('lbDots');

    // Build dots
    images.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'lb-dot' + (i === 0 ? ' active' : '');
      d.onclick = (e) => { e.stopPropagation(); goTo(i); };
      lbDots.appendChild(d);
    });

    function openLightbox(idx) {
      current = idx;
      lbImg.src = images[current];
      updateLb();
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleLbClick(e) {
      if (e.target === lb) closeLightbox();
    }

    function goTo(idx) {
      lbImg.classList.add('fading');
      setTimeout(() => {
        current = (idx + images.length) % images.length;
        lbImg.src = images[current];
        lbImg.classList.remove('fading');
        updateLb();
      }, 200);
    }

    function lbPrev(e) { e.stopPropagation(); goTo(current - 1); }
    function lbNext(e) { e.stopPropagation(); goTo(current + 1); }

    function updateLb() {
      lbCount.textContent = (current + 1) + ' / ' + images.length;
      document.querySelectorAll('.lb-dot').forEach((d, i) => {
        d.classList.toggle('active', i === current);
      });
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
      if (e.key === 'Escape')     closeLightbox();
    });

    // Touch swipe support
    let touchStartX = 0;
    lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
    lb.addEventListener('touchend',   e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) diff > 0 ? goTo(current + 1) : goTo(current - 1);
    });
  </script>

</body>
</html>
