<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Kuldeep Rohilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --text: #ffffff;
      --muted: #888888;
      --line: rgba(255,255,255,0.1);
      --font: 'Barlow', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      cursor: none;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .cursor-dot {
      position: fixed;
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .logo {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    nav { display: flex; gap: 36px; }

    nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    nav a:hover, nav a.active { opacity: 1; }

    .header-right {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text);
      opacity: 0.7;
      display: flex;
      gap: 16px;
    }

    .mob-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: none;
    }

    /* ── MOBILE OVERLAY ── */
    .mob-nav {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 400;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }
    .mob-nav.open { display: flex; }
    .mob-nav a {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .mob-nav a:hover { opacity: 1; }
    .mob-close {
      position: absolute;
      top: 16px; right: 32px;
      background: none; border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: none;
    }

    /* ── MAIN LAYOUT ── */
    main {
      padding-top: 56px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── CONTACT BODY ── */
    .contact-body {
      display: flex;
      flex: 1;
      min-height: calc(100vh - 56px);
    }

    /* LEFT PANEL */
    .contact-left {
      flex: 1;
      padding: 72px 48px 72px 48px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .contact-title {
      font-size: clamp(56px, 9vw, 120px);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: -0.01em;
      line-height: 0.95;
      margin-bottom: 48px;
    }

    /* Two-column info row */
    .contact-info-row {
      display: flex;
      gap: 80px;
      margin-top: auto;
    }

    .contact-subtitle {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      line-height: 1.65;
      max-width: 260px;
      letter-spacing: 0.01em;
      flex: 0 0 auto;
    }

    .contact-details {
      display: flex;
      flex-direction: column;
      gap: 36px;
    }

    .detail-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .detail-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .detail-link {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.01em;
      opacity: 0.9;
      transition: opacity 0.2s;
      position: relative;
      display: inline-block;
    }
    .detail-link::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 0; height: 1px;
      background: var(--text);
      transition: width 0.3s ease;
    }
    .detail-link:hover { opacity: 1; }
    .detail-link:hover::after { width: 100%; }

    /* RIGHT — image panel */
    .contact-right {
      width: 430px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .contact-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transition: transform 0.8s ease;
    }

    .contact-right:hover img {
      transform: scale(1.02);
    }

    /* ── FOOTER ── */
    footer {
      padding: 24px 48px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
    }

    footer p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .contact-title  { animation: fadeUp 0.55s ease both; }
    .contact-info-row { animation: fadeUp 0.55s 0.12s ease both; }
    .contact-right  { animation: fadeUp 0.6s 0.08s ease both; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .contact-body { flex-direction: column; }
      .contact-right { width: 100%; height: 60vw; }
      .contact-info-row { flex-direction: column; gap: 40px; }
    }

    @media (max-width: 580px) {
      body { cursor: auto; }
      .cursor-dot { display: none; }
      nav { display: none; }
      .header-right { display: none; }
      .mob-btn { display: block; }
      .contact-left { padding: 48px 24px; }
      .contact-title { margin-bottom: 40px; }
      footer { padding: 20px 24px; }
    }
  </style>
</head>

  <script>
    // IST Clock
    function tick() {
      const ist = new Date(new Date().getTime() + 5.5 * 3600000);
      let h = ist.getUTCHours(), m = ist.getUTCMinutes(), s = ist.getUTCSeconds();
      const ap = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').textContent =
        String(h).padStart(2,'0') + ':' +
        String(m).padStart(2,'0') + ':' +
        String(s).padStart(2,'0') + ' ' + ap;
    }
    tick(); setInterval(tick, 1000);

    // Cursor
    const dot = document.getElementById('cursorDot');
    document.addEventListener('mousemove', e => {
      dot.style.left = e.clientX + 'px';
      dot.style.top  = e.clientY + 'px';
    });

    // Mobile menu
    function mobOpen()  { document.getElementById('mobNav').classList.add('open');    document.body.style.overflow = 'hidden'; }
    function mobClose() { document.getElementById('mobNav').classList.remove('open'); document.body.style.overflow = ''; }
  </script>
