<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works — Kuldeep Rohilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --text: #ffffff;
      --muted: #888888;
      --line: rgba(255,255,255,0.1);
      --font: 'Barlow', sans-serif;
      --gap: 16px;
      --side: 32px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── CURSOR ── */
    .cursor-dot {
      position: fixed;
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--side);
      height: 56px;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .logo {
      font-size: 14px; font-weight: 700;
      color: var(--text); text-decoration: none;
      letter-spacing: 0.04em;
    }

    nav { display: flex; gap: 36px; }
    nav a {
      color: var(--text); text-decoration: none;
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      opacity: 0.7; transition: opacity 0.2s;
    }
    nav a:hover, nav a.active { opacity: 1; }

    .header-right {
      font-size: 13px; font-weight: 500;
      letter-spacing: 0.1em; color: var(--text); opacity: 0.7;
    }

    .mob-btn {
      display: none; background: none; border: none;
      color: var(--text); font-family: var(--font);
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase; cursor: none;
    }

    .mob-nav {
      display: none; position: fixed; inset: 0;
      background: var(--bg); z-index: 400;
      flex-direction: column; align-items: center;
      justify-content: center; gap: 40px;
    }
    .mob-nav.open { display: flex; }
    .mob-nav a {
      font-size: 36px; font-weight: 700;
      text-transform: uppercase; text-decoration: none;
      color: var(--text); opacity: 0.8; transition: opacity 0.2s;
    }
    .mob-nav a:hover { opacity: 1; }
    .mob-close {
      position: absolute; top: 16px; right: 32px;
      background: none; border: none; color: var(--text);
      font-family: var(--font); font-size: 11px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase; cursor: none;
    }

    /* ── MAIN ── */
    main { padding-top: 56px; }

    /* ── PAGE TITLE ── */
    .page-header {
      padding: 60px var(--side) 40px;
    }
    .page-header h1 {
      font-size: clamp(56px, 9vw, 112px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
    }

    /* ── WORKS GRID ──
       Outer padding on left/right/bottom = --side
       Gap between cards = --gap
       This creates: side gaps, top gap (from page-header padding-bottom), between gaps
    */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      column-gap: var(--gap);
      row-gap: 62px;
      padding: 0 var(--side) var(--side);
    }

    .work-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: none;
    }

    .work-img {
      overflow: hidden;
      aspect-ratio: 3/4;
      background: #111;
    }

    .work-img img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .work-card:hover .work-img img {
      transform: scale(1.05);
    }

    /* Category name below image — large, white, uppercase, no box */
    .work-name {
      padding: 14px 0 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* ── FOOTER ── */
    footer {
      padding: 24px var(--side);
      border-top: 1px solid var(--line);
    }
    footer p {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .works-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 580px) {
      :root { --gap: 10px; --side: 16px; }
      body { cursor: auto; }
      .cursor-dot { display: none; }
      nav, .header-right { display: none; }
      .mob-btn { display: block; }
      .page-header { padding: 36px 16px 24px; }
      .works-grid { grid-template-columns: repeat(2, 1fr); }
      footer { padding: 16px; }
    }
  </style>
</head>
<body>

  <div class="cursor-dot" id="cursorDot"></div>

  <!-- MOBILE NAV -->
  <div class="mob-nav" id="mobNav">
    <button class="mob-close" onclick="mobClose()">Close</button>
    <a href="index.html" onclick="mobClose()">Home</a>
    <a href="works.html" onclick="mobClose()">Works</a>
    <a href="prints.html" onclick="mobClose()">Prints</a>
    <a href="contact.html" onclick="mobClose()">Contact</a>
  </div>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">KD©</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="works.html" class="active">Works</a>
      <a href="prints.html">Prints</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="header-right">IND</div>
    <button class="mob-btn" onclick="mobOpen()">Menu</button>
  </header>

  <main>

    <div class="page-header">
      <h1>Works</h1>
    </div>

    <div class="works-grid">

      <a href="#" class="work-card">
        <div class="work-img">
          <img src="https://framerusercontent.com/images/NttmaohG1P69PNzRiBuwFbwDw0.webp" alt="Architectural" loading="lazy" />
        </div>
        <div class="work-name">Architectural</div>
      </a>

      <a href="#" class="work-card">
        <div class="work-img">
          <img src="https://framerusercontent.com/images/il2xuEmA8CeQHcLSG1SjZpTDys.jpg" alt="Automobile" loading="lazy" />
        </div>
        <div class="work-name">Automobile</div>
      </a>

      <a href="#" class="work-card">
        <div class="work-img">
          <img src="https://framerusercontent.com/images/SKwLwQq84WnB5bDrgWBresonBtw.jpg" alt="Food and Beverage" loading="lazy" />
        </div>
        <div class="work-name">Food and Beverage</div>
      </a>

      <a href="#" class="work-card">
        <div class="work-img">
          <img src="https://framerusercontent.com/images/gZRefHMvIF3jVM7Pv72QUN0.jpg" alt="Industrial" loading="lazy" />
        </div>
        <div class="work-name">Industrial</div>
      </a>

      <a href="#" class="work-card">
        <div class="work-img">
          <img src="https://framerusercontent.com/images/Xp5jx8fbA9Sxh5xJOEjhHN9wgcE.jpg" alt="Corporate" loading="lazy" />
        </div>
        <div class="work-name">Corporate</div>
      </a>

      <a href="#" class="work-card">
        <div class="work-img">
          <img src="https://framerusercontent.com/images/MVF4o0NaWQhCbJN7HDqJdoa8bs.webp" alt="People" loading="lazy" />
        </div>
        <div class="work-name">People</div>
      </a>

      <a href="#" class="work-card">
        <div class="work-img">
          <img src="https://framerusercontent.com/images/G7F5lBUTxyEcvIEObsURpkAAN4c.jpg" alt="Still Life" loading="lazy" />
        </div>
        <div class="work-name">Still Life</div>
      </a>

      <a href="travel.html" class="work-card">
        <div class="work-img">
          <img src="https://framerusercontent.com/images/kk06pmsE0G6koDaA4tTfqY7aDYc.jpg" alt="Travel" loading="lazy" />
        </div>
        <div class="work-name">Travel</div>
      </a>

    </div>

  </main>

  <footer>
    <p>©2026</p>
  </footer>

  <script>
    const dot = document.getElementById('cursorDot');
    document.addEventListener('mousemove', e => {
      dot.style.left = e.clientX + 'px';
      dot.style.top  = e.clientY + 'px';
    });
    function mobOpen()  { document.getElementById('mobNav').classList.add('open');    document.body.style.overflow = 'hidden'; }
    function mobClose() { document.getElementById('mobNav').classList.remove('open'); document.body.style.overflow = ''; }
  </script>
</body>
</html>
