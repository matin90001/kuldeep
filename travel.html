<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel — Kuldeep Rohilla</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --text: #ffffff; --muted: #888888;
      --line: rgba(255,255,255,0.1); --font: 'Barlow', sans-serif; --side: 32px;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; overflow-x: hidden; cursor: none; }

    /* CURSOR */
    .cursor-dot { position: fixed; width: 8px; height: 8px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); mix-blend-mode: difference; transition: transform 0.15s ease; }
    .cursor-dot.big { transform: translate(-50%,-50%) scale(5); opacity: 0.3; }

    /* HEADER */
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 500; display: flex; align-items: center; justify-content: space-between; padding: 0 var(--side); height: 56px; background: rgba(14,14,14,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
    .logo { font-size: 14px; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: 0.04em; }
    nav { display: flex; gap: 36px; }
    nav a { color: var(--text); text-decoration: none; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; transition: opacity 0.2s; }
    nav a:hover, nav a.active { opacity: 1; }
    .header-right { font-size: 13px; font-weight: 500; letter-spacing: 0.1em; color: var(--text); opacity: 0.7; }
    .mob-btn { display: none; background: none; border: none; color: var(--text); font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; }

    /* MOBILE NAV */
    .mob-nav { display: none; position: fixed; inset: 0; background: #0e0e0e; z-index: 600; flex-direction: column; align-items: flex-start; justify-content: center; padding: 48px var(--side); gap: 24px; }
    .mob-nav.open { display: flex; }
    .mob-nav a { font-size: 40px; font-weight: 800; color: #fff; text-decoration: none; text-transform: uppercase; }
    .mob-close { position: absolute; top: 18px; right: var(--side); background: none; border: none; color: #fff; font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; }

    /* PAGE HEADER */
    .page-header { padding: 100px var(--side) 48px; border-bottom: 1px solid var(--line); }
    .page-header h1 { font-size: clamp(40px, 7vw, 96px); font-weight: 800; text-transform: uppercase; letter-spacing: -0.01em; line-height: 1; }
    .page-header p { margin-top: 14px; font-size: 13px; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; }

    /* GALLERY GRID */
    .gallery {
      padding: 32px var(--side) 80px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-rows: 72px;
      gap: 12px;
    }

    .photo-item { position: relative; overflow: hidden; background: #1a1a1a; cursor: none; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s; filter: brightness(0.88); }
    .photo-item:hover img { transform: scale(1.04); filter: brightness(1); }

    .photo-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0); display: flex; align-items: center; justify-content: center; transition: background 0.3s; }
    .photo-item:hover .photo-overlay { background: rgba(0,0,0,0.2); }

    .expand-icon { width: 44px; height: 44px; border: 1px solid rgba(255,255,255,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.7); transition: opacity 0.3s, transform 0.3s; }
    .expand-icon svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 1.8; }
    .photo-item:hover .expand-icon { opacity: 1; transform: scale(1); }

    /* ── GRID PLACEMENT — different pattern from selective-work ── */

    /* Row 1: wide landscape + portrait */
    .photo-item:nth-child(1)  { grid-column: 1 / 9;  grid-row: 1 / 6;  } /* landscape wide */
    .photo-item:nth-child(2)  { grid-column: 9 / 13; grid-row: 1 / 9;  } /* portrait tall */

    /* Row 2 */
    .photo-item:nth-child(3)  { grid-column: 1 / 5;  grid-row: 6 / 14; } /* portrait tall */
    .photo-item:nth-child(4)  { grid-column: 5 / 9;  grid-row: 6 / 11; } /* landscape */
    .photo-item:nth-child(5)  { grid-column: 5 / 9;  grid-row: 11 / 16;} /* landscape */
    .photo-item:nth-child(6)  { grid-column: 9 / 13; grid-row: 9 / 16; } /* portrait */

    /* Row 3: full-width landscape */
    .photo-item:nth-child(7)  { grid-column: 1 / 13; grid-row: 16 / 21; } /* full width */

    /* Row 4 */
    .photo-item:nth-child(8)  { grid-column: 1 / 5;  grid-row: 21 / 26; } /* landscape */
    .photo-item:nth-child(9)  { grid-column: 5 / 9;  grid-row: 21 / 29; } /* portrait tall */
    .photo-item:nth-child(10) { grid-column: 9 / 13; grid-row: 21 / 26; } /* landscape */

    /* Row 5 */
    .photo-item:nth-child(11) { grid-column: 1 / 5;  grid-row: 26 / 31; } /* landscape */
    .photo-item:nth-child(12) { grid-column: 9 / 13; grid-row: 26 / 31; } /* landscape */

    /* LIGHTBOX */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; display: none; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lb-img-wrap { max-width: 88vw; max-height: 88vh; display: flex; align-items: center; justify-content: center; }
    .lb-img-wrap img { max-width: 88vw; max-height: 88vh; object-fit: contain; display: block; transition: opacity 0.2s; }
    .lb-img-wrap img.fade { opacity: 0; }
    .lb-counter { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
    .lb-close { position: absolute; top: 24px; right: 32px; background: none; border: none; color: #fff; font-family: var(--font); font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; }
    .lb-close:hover { opacity: 1; }
    .lb-prev, .lb-next { position: absolute; top: 50%; transform: translateY(-50%); background: none; border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .lb-prev { left: 32px; } .lb-next { right: 32px; }
    .lb-prev:hover, .lb-next:hover { border-color: #fff; background: rgba(255,255,255,0.08); }
    .lb-prev svg, .lb-next svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; }
    .lb-dots { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; }
    .lb-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); border: none; cursor: pointer; padding: 0; transition: background 0.2s, transform 0.2s; }
    .lb-dot.active { background: #fff; transform: scale(1.4); }

    /* FOOTER */
    footer { padding: 24px var(--side); border-top: 1px solid var(--line); }
    footer p { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      nav, .header-right { display: none; }
      .mob-btn { display: block; }
      .gallery { grid-template-columns: 1fr 1fr; grid-auto-rows: 200px; gap: 8px; padding: 24px 16px 60px; }
      .photo-item { grid-column: auto !important; grid-row: auto !important; }
      .photo-item:nth-child(1), .photo-item:nth-child(7),
      .photo-item:nth-child(11) { grid-column: span 2 !important; }
      .lb-prev { left: 10px; } .lb-next { right: 10px; }
      .page-header { padding: 80px 16px 28px; }
    }
  </style>
</head>
<body>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="bgClose(event)">
    <div class="lb-counter" id="lbCounter">1 / 12</div>
    <button class="lb-close" onclick="closeLb()">Close ✕</button>
    <button class="lb-prev" onclick="go(cur-1,event)"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="lb-img-wrap"><img id="lbImg" src="" alt="" /></div>
    <button class="lb-next" onclick="go(cur+1,event)"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>
    <div class="lb-dots" id="lbDots"></div>
  </div>

  <footer><p>©2026 Kuldeep Rohilla</p></footer>

  <script>
    const dot = document.getElementById('cursorDot');
    document.addEventListener('mousemove', e => { dot.style.left = e.clientX+'px'; dot.style.top = e.clientY+'px'; });
    document.querySelectorAll('.photo-item').forEach(el => {
      el.addEventListener('mouseenter', () => dot.classList.add('big'));
      el.addEventListener('mouseleave', () => dot.classList.remove('big'));
    });

    function mobOpen()  { document.getElementById('mobNav').classList.add('open'); }
    function mobClose() { document.getElementById('mobNav').classList.remove('open'); }

    const imgs = Array.from({length:12}, (_,i) => `images/travel-${i+1}.jpg`);
    let cur = 0;
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCounter = document.getElementById('lbCounter');
    const dotsWrap = document.getElementById('lbDots');

    imgs.forEach((_,i) => {
      const d = document.createElement('button');
      d.className = 'lb-dot' + (i===0?' active':'');
      d.onclick = e => { e.stopPropagation(); go(i); };
      dotsWrap.appendChild(d);
    });

    function openLb(i) { cur=i; lbImg.src=imgs[i]; update(); lb.classList.add('open'); document.body.style.overflow='hidden'; }
    function closeLb() { lb.classList.remove('open'); document.body.style.overflow=''; }
    function bgClose(e) { if(e.target===lb) closeLb(); }

    function go(i, e) {
      if(e) e.stopPropagation();
      lbImg.classList.add('fade');
      setTimeout(() => { cur=((i%imgs.length)+imgs.length)%imgs.length; lbImg.src=imgs[cur]; lbImg.classList.remove('fade'); update(); }, 180);
    }

    function update() {
      lbCounter.textContent = (cur+1)+' / '+imgs.length;
      dotsWrap.querySelectorAll('.lb-dot').forEach((d,i) => d.classList.toggle('active', i===cur));
    }

    document.addEventListener('keydown', e => {
      if(!lb.classList.contains('open')) return;
      if(e.key==='ArrowLeft') go(cur-1);
      if(e.key==='ArrowRight') go(cur+1);
      if(e.key==='Escape') closeLb();
    });

    let tx=0;
    lb.addEventListener('touchstart', e => { tx=e.touches[0].clientX; });
    lb.addEventListener('touchend',   e => { const d=tx-e.changedTouches[0].clientX; if(Math.abs(d)>50) go(d>0?cur+1:cur-1); });
  </script>
